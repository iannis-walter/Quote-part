services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quotepart
      POSTGRES_USER: quotepart
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Définir POSTGRES_PASSWORD dans .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quotepart -d quotepart"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/quotepart
      SPRING_DATASOURCE_USERNAME: quotepart
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Définir POSTGRES_PASSWORD dans .env}
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
