services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quotepart
      POSTGRES_USER: quotepart
      POSTGRES_PASSWORD: quotepart
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quotepart -d quotepart"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/quotepart
      SPRING_DATASOURCE_USERNAME: quotepart
      SPRING_DATASOURCE_PASSWORD: quotepart
      QUOTEPART_DEMO_AMORCER: "true"
    ports:
      - "8080:8080"
